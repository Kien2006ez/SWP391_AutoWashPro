<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - AutoWash Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #2c3e50; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: white; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .box h2 { text-align: center; color: #2c3e50; margin-bottom: 8px; font-size: 22px; }
        .box p { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; transition: .2s; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: .2s; }
        button:hover { background: #34495e; }
        .error { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .logo { text-align: center; font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">🚗</div>
    <h2>AutoWash Pro</h2>
    <p>Đăng nhập quản trị viên</p>

    <label>Tên đăng nhập</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username"/>

    <label>Mật khẩu</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

    <button onclick="doLogin()">Đăng nhập</button>
    <div class="error" id="error-msg">Tên đăng nhập hoặc mật khẩu không đúng</div>
</div>

<script>
async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!username || !password) { errEl.textContent = 'Vui lòng nhập đầy đủ'; errEl.style.display = 'block'; return; }

    try {
        const res = await fetch('http://localhost:8000/api/auth/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Đăng nhập thất bại');

        localStorage.setItem('aw_admin_token', data.access_token);
        location.href = 'dashboard.html';
    } catch(e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
    }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Nếu đã đăng nhập rồi thì redirect
if (localStorage.getItem('aw_admin_token')) location.href = 'dashboard.html';
</script>
</body>
</html>
