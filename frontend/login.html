<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Admin AutoWashPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        /* Đồng bộ biến màu sắc với Dashboard */
        :root {
            --primary: #1a3c5e;
            --accent:  #00aaff;
            --bg: #f0f4f8;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Khung đăng nhập phong cách thẻ (card) sạch sẽ */
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        /* Đồng bộ logo chữ */
        .brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .brand span { color: var(--accent); }

        /* Tùy chỉnh form input */
        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: #94a3b8;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(0, 170, 255, 0.25);
            border-radius: 0.375rem;
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Nút đăng nhập */
        .btn-login {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-login:hover {
            background-color: #0088cc;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">Auto<span>Wash</span>Pro</div>
        <h5 class="text-center mb-4 text-muted" style="font-size: 0.95rem;">Đăng nhập không gian quản trị</h5>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-bold">TÀI KHOẢN</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập..." required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-bold">MẬT KHẨU</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." required>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4 small">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label text-muted" for="remember">Ghi nhớ tôi</label>
                </div>
                <a href="#" class="text-decoration-none" style="color: var(--accent)">Quên mật khẩu?</a>
            </div>
            
            <button type="submit" class="btn btn-login w-100 rounded-3">Đăng Nhập</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // Ngăn chặn hành vi mặc định của form (tải lại trang)
            e.preventDefault(); 
            
            // Lấy thông tin (Sau này Frontend sẽ gửi thông tin này qua API của FastAPI)
            const user = document.getElementById('username').value;
            
            // Giả lập đăng nhập thành công và tự động chuyển hướng
            console.log("Đang xử lý đăng nhập cho: " + user);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
